name: Cào Home

on:
  schedule:
    # Chỉnh lại giờ Việt Nam (UTC = VN - 7 tiếng):
    # 4h sáng VN  -> 21h tối hôm trước (UTC)
    # 10h sáng VN -> 3h sáng (UTC)
    # 15h chiều VN -> 8h sáng (UTC)
    # 19h tối VN   -> 12h trưa (UTC)
    - cron: '0 21,3,8,12 * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # Lấy lịch sử commit để tránh lỗi khi pull rebase
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run crawl script
        run: python crawl_anime.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Thêm các file kết quả
          git add data_2026_perfect.json last_run.txt
          
          # Kiểm tra nếu có thay đổi thì mới tiến hành push
          if ! git diff --staged --quiet; then
            git commit -m "Auto update phim: $(date)"
            
            # Khắc phục lỗi ! [rejected] bằng cách pull dữ liệu mới nhất về trước khi push
            git pull --rebase origin main
            
            git push origin main
          else
            echo "Không có dữ liệu mới để cập nhật."
          fi
